<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark Tactical Canvas -->
  <rect width="32" height="32" rx="6" fill="#05080F" />
  
  <!-- Subtle Outer Frame -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="#FFB000" stroke-width="1" stroke-opacity="0.25" />
  
  <!-- Tactical Corner Brackets (Amber) -->
  <path d="M5 9 V5 H9" fill="none" stroke="#FFB000" stroke-width="2" stroke-linecap="square" />
  <path d="M23 5 H27 V9" fill="none" stroke="#FFB000" stroke-width="2" stroke-linecap="square" />
  <path d="M5 23 V27 H9" fill="none" stroke="#FFB000" stroke-width="2" stroke-linecap="square" />
  <path d="M23 27 H27 V23" fill="none" stroke="#FFB000" stroke-width="2" stroke-linecap="square" />
  
  <!-- Terminal Prompt '>' (Glowing Green) -->
  <path d="M10 11.5 L15 16 L10 20.5" fill="none" stroke="#2ECC71" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Cursor Bar '_' (Tactical Amber) -->
  <line x1="17.5" y1="20.5" x2="22.5" y2="20.5" stroke="#FFB000" stroke-width="2.5" stroke-linecap="round" />
</svg>
